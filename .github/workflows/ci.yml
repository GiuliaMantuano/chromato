name: CI

on:
  # Run on PRs targeting main, plus PRs targeting any fix/* branch so that
  # stacked PRs (e.g. PR #35 stacked on PR #34) get their own CI signal
  # instead of waiting for the parent PR to merge first.
  pull_request:
    branches: [main, 'fix/**']
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  commit:
    name: Commit Stage
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Architecture check
        run: pnpm depcruise --validate .dependency-cruiser.cjs src

      - name: Build
        run: pnpm build

      - name: Unit tests with coverage
        run: pnpm vitest run --coverage --reporter=verbose tests/unit/

      - name: Coverage quality gate
        run: |
          COVERAGE=$(node -e "
            const c = require('./coverage/coverage-summary.json');
            const lines = c.total.lines.pct;
            const branches = c.total.branches.pct;
            console.log(Math.min(lines, branches).toFixed(2));
          ")
          echo "Coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 70" | bc -l)" -eq 1 ]; then
            echo "ERROR: Coverage ${COVERAGE}% is below the 70% threshold"
            exit 1
          fi

      - name: Dependency audit
        run: pnpm audit --audit-level=high

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  acceptance-tests:
    name: Acceptance Tests (${{ matrix.os }})
    needs: commit
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    env:
      TERM: xterm-256color
      LANG: en_US.UTF-8

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Acceptance tests
        run: pnpm test:acceptance

  benchmarks:
    name: Performance Benchmarks
    needs: commit
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install sysstat (pidstat)
        run: sudo apt-get install -y sysstat

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Benchmark -- cold start (--version)
        id: bench_version
        run: |
          TIMES=()
          for i in {1..5}; do
            T=$({ time node dist/index.js --version; } 2>&1 | grep real | awk '{print $2}' | sed 's/m/min /;s/s//')
            MS=$(echo "$T" | awk '{print ($1 * 60 + $2) * 1000}')
            TIMES+=($MS)
          done
          MEDIAN=$(printf '%s\n' "${TIMES[@]}" | sort -n | awk 'NR==3')
          echo "cold_start_ms=${MEDIAN}" >> $GITHUB_OUTPUT
          echo "Cold start median: ${MEDIAN}ms"
          if [ "$(echo "$MEDIAN > 200" | bc -l)" -eq 1 ]; then
            echo "ERROR: Cold start ${MEDIAN}ms exceeds 200ms gate"
            exit 1
          fi

      - name: Benchmark -- status command latency
        id: bench_status
        run: |
          # Write a minimal idle state.json for the status command to read
          mkdir -p ~/.local/share/chromato
          cat > ~/.local/share/chromato/state.json << 'EOF'
          {"schemaVersion":1,"phase":"WORK","remainingSeconds":1200,"elapsedSeconds":300,"progressFraction":0.2,"currentPomodoro":1,"cycleCount":4,"completedToday":0,"streak":0,"isOverdue":false,"overdueElapsedSeconds":0,"lastUpdatedUtc":"2026-03-28T09:00:00Z"}
          EOF
          TIMES=()
          for i in {1..10}; do
            T=$({ time node dist/index.js status --format tmux; } 2>&1 | grep real | awk '{print $2}' | sed 's/m/min /;s/s//')
            MS=$(echo "$T" | awk '{print ($1 * 60 + $2) * 1000}')
            TIMES+=($MS)
          done
          MEDIAN=$(printf '%s\n' "${TIMES[@]}" | sort -n | awk 'NR==5')
          echo "status_ms=${MEDIAN}" >> $GITHUB_OUTPUT
          echo "Status command median: ${MEDIAN}ms"
          if [ "$(echo "$MEDIAN > 200" | bc -l)" -eq 1 ]; then
            echo "ERROR: Status command ${MEDIAN}ms exceeds 200ms gate"
            exit 1
          fi

      - name: Benchmark -- RSS and CPU steady-state
        id: bench_rss
        run: |
          node scripts/benchmark-rss.cjs

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks
          path: benchmark-results.json
          retention-days: 30

  all-checks:
    name: All CI Checks
    needs: [commit, acceptance-tests, benchmarks]
    runs-on: ubuntu-22.04
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          # CodeQL SAST job has been removed entirely (see ADR-007 and
          # docs/troubleshooting/2026-04-27-rca-remaining-ci-reds.md): GHAS is
          # unavailable on free private personal repos; re-add in a dedicated
          # PR if/when this repo goes public.
          if [ "${{ needs.commit.result }}" != "success" ] || \
             [ "${{ needs.acceptance-tests.result }}" != "success" ] || \
             [ "${{ needs.benchmarks.result }}" != "success" ]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI checks passed"
