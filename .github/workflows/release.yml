name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  NODE_VERSION: '22'

jobs:
  verify-tag:
    name: Verify Tag is on Main
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag points to main
        run: |
          TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref_name }})
          MAIN_CONTAINS=$(git branch -r --contains $TAG_COMMIT | grep 'origin/main' || true)
          if [ -z "$MAIN_CONTAINS" ]; then
            echo "ERROR: Tag ${{ github.ref_name }} is not on main branch"
            exit 1
          fi

  full-ci:
    name: Full CI on Tagged Commit
    needs: verify-tag
    uses: ./.github/workflows/ci.yml

  sbom:
    name: Generate SBOM
    needs: full-ci
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate SBOM (CycloneDX)
        run: |
          pnpm dlx @cyclonedx/cyclonedx-npm \
            --output-format JSON \
            --output-file sbom.cyclonedx.json \
            --package-lock-only

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.cyclonedx.json

  github-release:
    name: Create GitHub Release
    needs: [full-ci, sbom]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download SBOM
        uses: actions/download-artifact@v8
        with:
          name: sbom

      - name: Generate changelog
        run: |
          # Extract this release's section straight from CHANGELOG.md (Keep a
          # Changelog format: "## [X.Y.Z] - date" headers) rather than
          # regenerating notes from raw commit messages -- CHANGELOG.md is the
          # curated, human-written record; git log is not.
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") { found=1; next }
              next
            }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md

          # Fall back to a minimal placeholder if the version has no matching
          # CHANGELOG.md section (shouldn't happen if CHANGELOG.md is kept
          # up to date, but never leave an empty release body).
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release ${GITHUB_REF_NAME}. See CHANGELOG.md for details." > RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: sbom.cyclonedx.json
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

