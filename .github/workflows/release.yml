name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  verify-tag:
    name: Verify Tag is on Main
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag points to main
        run: |
          TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref_name }})
          MAIN_CONTAINS=$(git branch -r --contains $TAG_COMMIT | grep 'origin/main' || true)
          if [ -z "$MAIN_CONTAINS" ]; then
            echo "ERROR: Tag ${{ github.ref_name }} is not on main branch"
            exit 1
          fi

  full-ci:
    name: Full CI on Tagged Commit
    needs: verify-tag
    uses: ./.github/workflows/ci.yml

  sbom:
    name: Generate SBOM
    needs: full-ci
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate SBOM (CycloneDX)
        run: |
          pnpm dlx @cyclonedx/cyclonedx-npm \
            --output-format JSON \
            --output-file sbom.cyclonedx.json \
            --package-lock-only

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json

  publish-npm:
    name: Publish to npm
    needs: [full-ci, sbom]
    runs-on: ubuntu-22.04
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/chromato

    permissions:
      contents: read
      id-token: write  # required for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js (with npm registry)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production bundle
        run: pnpm build

      - name: Publish to npm with provenance
        run: pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

  github-release:
    name: Create GitHub Release
    needs: publish-npm
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log ${PREV_TAG}..HEAD \
              --pretty=format:"- %s (%h)" \
              --grep="^feat\|^fix\|^perf\|^BREAKING" \
              > RELEASE_NOTES.md
          else
            echo "Initial release" > RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: sbom.cyclonedx.json
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

